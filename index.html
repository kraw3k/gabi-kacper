<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Strona w budowie</title>
  <style>
    :root {
      --bg: #faf8f5;
      --text: #2c2622;
      --muted: #6b635c;
      --accent: #8b6914;
      --card: #fff;
      --shadow: rgba(44, 38, 34, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.5;
    }

    main {
      max-width: 28rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 1.85rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      margin: 0 0 0.75rem;
    }

    p.lead {
      color: var(--muted);
      font-size: 1rem;
      margin: 0 0 2rem;
    }

    .countdown {
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem 1.25rem;
      box-shadow: 0 4px 24px var(--shadow);
      margin-bottom: 1.5rem;
    }

    .countdown-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    .countdown-item {
      padding: 0.5rem 0.25rem;
    }

    .countdown-value {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .countdown-unit {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: lowercase;
    }

    footer {
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Strona w budowie</h1>
    <p class="lead">Wkrótce więcej informacji.</p>

    <div class="countdown" aria-live="polite">
      <div class="countdown-label">Do dnia ślubu — 11 lipca 2026</div>
      <div class="countdown-grid">
        <div class="countdown-item">
          <div class="countdown-value" id="cd-days">—</div>
          <div class="countdown-unit">dni</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-value" id="cd-hours">—</div>
          <div class="countdown-unit">godz.</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-value" id="cd-minutes">—</div>
          <div class="countdown-unit">min</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-value" id="cd-seconds">—</div>
          <div class="countdown-unit">sek</div>
        </div>
      </div>
    </div>

    <footer>Gabriela i Kacper</footer>
  </main>

  <script>
    (function () {
      // 11.07.2026, 00:00 w strefie lokalnej przeglądarki
      var target = new Date(2026, 6, 11, 0, 0, 0, 0);

      var elDays = document.getElementById("cd-days");
      var elHours = document.getElementById("cd-hours");
      var elMinutes = document.getElementById("cd-minutes");
      var elSeconds = document.getElementById("cd-seconds");

      function pad(n) {
        return String(n).padStart(2, "0");
      }

      function tick() {
        var now = new Date();
        var diff = target.getTime() - now.getTime();

        if (diff <= 0) {
          elDays.textContent = "0";
          elHours.textContent = "0";
          elMinutes.textContent = "0";
          elSeconds.textContent = "0";
          return;
        }

        var sec = Math.floor(diff / 1000);
        var days = Math.floor(sec / 86400);
        sec %= 86400;
        var hours = Math.floor(sec / 3600);
        sec %= 3600;
        var minutes = Math.floor(sec / 60);
        var seconds = sec % 60;

        elDays.textContent = String(days);
        elHours.textContent = pad(hours);
        elMinutes.textContent = pad(minutes);
        elSeconds.textContent = pad(seconds);
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
